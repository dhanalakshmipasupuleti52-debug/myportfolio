  <!-- HEADER -->

  <!-- TICKET SECTION -->
  <section class="ticket-section">

    <h2 class="ticket-heading">Book Your Tickets</h2>

    <div class="ticket-box">

      <form>

        <input type="text" placeholder="Full Name" required><br><br>

        <input type="email" placeholder="Email Address" required><br><br>

        <select required>
          <option value="">Select Place</option>
          <option>Taj Mahal</option>
          <option>Eiffel Tower</option>
          <option>Great Wall of China</option>
          <option>Statue of Liberty</option>
        </select><br><br>

        <input type="date" required><br><br>

        <input type="number" placeholder="Number of Tickets" min="1" required><br><br>

        <button type="submit">Book Now</button>

      </form>

    </div>

  </section>

</body>
</html>
